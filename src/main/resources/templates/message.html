

    <div
     
    th:if="${session.message}"  
    th:fragment="messagebox"
    th:object="${session.message}"
    th:classappend="*{'text-sm text-'+type+'-500 rounded-4xl border border-green-300'}"
     class="flex items-start sm:items-center p-2 mb-4 "
     role="alert">

  <svg class="w-4 h-4 me-2 shrink-0 mt-0.5 sm:mt-0"
       xmlns="http://www.w3.org/2000/svg"
       fill="none"
       viewBox="0 0 24 24">
       
    <path stroke="currentColor"
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M10 11h2v5m-2 0h4m-2.592-8.5h.01M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>
  </svg>

  <p>
    <span class="font-medium me-1">Success alert!</span>
    <span th:text="*{content}"></span>
  </p>

</div>
