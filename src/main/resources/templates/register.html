<!DOCTYPE html>
<html lang="en" th:replace="~{base::parent(~{::#content})}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>register</title>
</head>
<body >
   


<div id="content" class="grid place-items-center min-h-screen">
    
            

<div class="bg-neutral-primary-soft block max-w-md w-full  p-6 border-t-4 border-blue-600 rounded-lg shadow-xl hover:bg-neutral-secondary-medium">
   
     <h5 class="mb-2 items-center text-2xl font-semibold tracking-tight text-heading leading-4">SignUp Here!</h5>
    <p class="font-normal   dark:text-gray-900 text-gray-300 ">Manage your contacts on cloud....</p>
    
    <form th:action="@{/signingUp}" method="post" th:object="${userForm}">
       <div class="relative z-0 w-full mb-5 group">
        <input type="text" th:field="*{name}" name="name" id="name" class="block py-2.5 px-0 w-full text-sm text-heading bg-transparent border-0 border-b-2 border-default-medium appearance-none focus:outline-none focus:ring-0 focus:border-brand peer" placeholder=" " required />
        <label for="name" class="absolute mt-2 text-sm text-body duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:start-0 peer-focus:text-fg-brand peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6 rtl:peer-focus:translate-x-1/4 rtl:peer-focus:left-auto">Name</label>
    </div>
        
  <div class="relative z-0 w-full mb-5 group">
      <input type="email" th:field="*{email}"  name="email" id="email" class="block py-2.5 px-0 w-full text-sm text-heading bg-transparent border-0 border-b-2 border-default-medium appearance-none focus:outline-none focus:ring-0 focus:border-brand peer" placeholder=" " required />
      <label for="email" class="absolute text-sm text-body duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:start-0 peer-focus:text-fg-brand peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6 rtl:peer-focus:translate-x-1/4 rtl:peer-focus:left-auto">Email address</label>
  </div>
  <div class="relative z-0 w-full mb-5 group">
      <input type="password" th:field="*{password}" name="password" id="password" class="block py-2.5 px-0 w-full text-sm text-heading bg-transparent border-0 border-b-2 border-default-medium appearance-none focus:outline-none focus:ring-0 focus:border-brand peer" placeholder=" " required />
      <label for="password" class="absolute text-sm text-body duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:start-0 peer-focus:text-fg-brand peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6 rtl:peer-focus:translate-x-1/4 rtl:peer-focus:left-auto">Password</label>
  </div>
   
  <div class="relative z-0 w-full mb-5 group">
        <input type="tel" th:field="*{phoneNumber}" name="phoneNumber" id="phoneNumber" class="block py-2.5 px-0 w-full text-sm text-heading bg-transparent border-0 border-b-2 border-default-medium appearance-none focus:outline-none focus:ring-0 focus:border-brand peer" placeholder=" " required />
        <label for="phoneNumber" class="absolute text-sm text-body duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:start-0 peer-focus:text-fg-brand peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6 rtl:peer-focus:translate-x-1/4 rtl:peer-focus:left-auto">Phone number</label>
    </div>
  
  
    <div class="relative z-0 w-full mb-5 group">
        <input type="text" th:field="*{about}" name="floating_about" id="floating_about" class="block py-2.5 px-0 w-full text-sm text-heading bg-transparent border-0 border-b-2 border-default-medium appearance-none focus:outline-none focus:ring-0 focus:border-brand peer" placeholder=" " required />
        <label for="floating_about" row="4" class="absolute text-sm text-body duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:start-0 peer-focus:text-fg-brand peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6 rtl:peer-focus:translate-x-1/4 rtl:peer-focus:left-auto">About</label>
    </div>
  <div class="mb-3 flex justify-center space-x-3">
    <button type="submit" class=" text-gray-900 dark:text-gray-100 
       bg-gray-400 dark:bg-gray-700 
       hover:bg-gray-500 dark:hover:bg-gray-900  rounded-xl bg-brand hover:bg-brand-strong box-border border border-transparent focus:ring-4 focus:ring-brand-medium shadow-xs font-medium leading-5 rounded-base text-sm px-3 py-2 focus:outline-none">SignUp</button>
   <button type="submit" class=" text-gray-900 dark:text-gray-100 
       bg-gray-400 dark:bg-gray-700 
       hover:bg-gray-500 dark:hover:bg-gray-900  rounded-xl bg-brand hover:bg-brand-strong box-border border border-transparent focus:ring-4 focus:ring-brand-medium shadow-xs font-medium leading-5 rounded-base text-sm px-3 py-2 focus:outline-none">Reset</button>
  
  
      </div>


    </form>
    </div>


        
</div>


    
</body>
</html>
